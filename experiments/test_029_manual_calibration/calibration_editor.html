<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FutBotMX Calibracion Manual</title>
<style>
:root {
  --ink: #1d221f;
  --muted: #63706a;
  --line: #c6d5cc;
  --field: #e8f4e8;
  --panel: #ffffff;
  --page: #f7faf7;
  --green: #2e6f4e;
  --blue: #315d9b;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  background: var(--page);
  color: var(--ink);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.shell {
  width: min(1280px, calc(100vw - 28px));
  margin: 0 auto;
  padding: 22px 0 34px;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  border-bottom: 2px solid var(--line);
  padding-bottom: 14px;
}
header p {
  margin: 0 0 4px;
  color: var(--green);
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
}
h1 {
  margin: 0;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: 0;
}
h2 {
  margin: 0 0 10px;
  font-size: 18px;
  letter-spacing: 0;
}
.workspace {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  gap: 12px;
  margin-top: 16px;
}
.panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 14px;
}
select,
button {
  width: 100%;
  min-height: 38px;
  border-radius: 6px;
  border: 1px solid var(--line);
  font: inherit;
}
select {
  padding: 7px 9px;
}
button {
  cursor: pointer;
  font-weight: 800;
  background: var(--green);
  color: #fff;
  border-color: #24583d;
}
.buttons {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}
.buttons button:first-child {
  background: #fff;
  color: var(--green);
}
.meta,
.muted,
ol {
  color: var(--muted);
  font-size: 13px;
}
ol {
  padding-left: 22px;
}
li {
  margin-bottom: 7px;
}
.canvasPanel {
  overflow: auto;
}
canvas {
  width: 100%;
  height: auto;
  display: block;
  background: var(--field);
  border: 1px solid var(--line);
}
a {
  color: var(--blue);
}
@media (max-width: 900px) {
  .workspace {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<main class="shell">
<header>
<div>
<p>FutBotMX Nivel 3</p>
<h1>Calibracion manual de cancha</h1>
</div>
<span>manual_field_calibration_v0.1</span>
</header>
<section class="workspace">
<aside class="panel">
<h2>Clip</h2>
<select id="clipSelect"></select>
<div id="clipMeta" class="meta"></div>
<div class="buttons">
<button type="button" id="resetBtn">Reset</button>
<button type="button" id="downloadBtn">Descargar JSON</button>
<button type="button" id="saveBtn">Guardar</button>
</div>
<ol id="pointList"></ol>
<p id="saveStatus" class="muted"></p>
</aside>
<section class="panel canvasPanel">
<canvas id="fieldCanvas"></canvas>
</section>
</section>
</main>
<script>window.CALIBRATION_CLIPS = [{"clip_id": "video_595", "role": "dense_candidate", "width": 1344, "height": 1792, "fps": 59.71505265331406, "overlay_path": "/home/guillermo/Documentos/StreetVisionFC/experiments/test_017_level2_closure/video_595/overlay_lvl2_evt_000001_frame_120.png", "overlay_static_path": "../test_017_level2_closure/video_595/overlay_lvl2_evt_000001_frame_120.png", "overlay_server_path": "/artifact?path=/home/guillermo/Documentos/StreetVisionFC/experiments/test_017_level2_closure/video_595/overlay_lvl2_evt_000001_frame_120.png", "overlay_frame": 120, "image_points": [{"label": "top_left", "x": 2.223735809326172, "y": 486.5462951660156}, {"label": "top_right", "x": 1342.5997314453125, "y": 486.5462951660156}, {"label": "bottom_right", "x": 1342.5997314453125, "y": 1788.4796142578125}, {"label": "bottom_left", "x": 2.223735809326172, "y": 1788.4796142578125}], "confidence": 0.95, "notes": "Seeded from automatic field bbox for the manual editor. Replace the four corners in the browser editor for human-reviewed calibration.", "field_points": [{"label": "top_left", "x_norm": 0.0, "y_norm": 0.0}, {"label": "top_right", "x_norm": 1.0, "y_norm": 0.0}, {"label": "bottom_right", "x_norm": 1.0, "y_norm": 1.0}, {"label": "bottom_left", "x_norm": 0.0, "y_norm": 1.0}]}, {"clip_id": "video_667", "role": "dense_candidate", "width": 1360, "height": 1808, "fps": 59.70695970695971, "overlay_path": "/home/guillermo/Documentos/StreetVisionFC/experiments/test_017_level2_closure/video_667/overlay_lvl2_evt_000001_frame_120.png", "overlay_static_path": "../test_017_level2_closure/video_667/overlay_lvl2_evt_000001_frame_120.png", "overlay_server_path": "/artifact?path=/home/guillermo/Documentos/StreetVisionFC/experiments/test_017_level2_closure/video_667/overlay_lvl2_evt_000001_frame_120.png", "overlay_frame": 120, "image_points": [{"label": "top_left", "x": 3.79671573638916, "y": 685.8245849609375}, {"label": "top_right", "x": 1360.0, "y": 685.8245849609375}, {"label": "bottom_right", "x": 1360.0, "y": 1806.9952392578125}, {"label": "bottom_left", "x": 3.79671573638916, "y": 1806.9952392578125}], "confidence": 0.95, "notes": "Seeded from automatic field bbox for the manual editor. Replace the four corners in the browser editor for human-reviewed calibration.", "field_points": [{"label": "top_left", "x_norm": 0.0, "y_norm": 0.0}, {"label": "top_right", "x_norm": 1.0, "y_norm": 0.0}, {"label": "bottom_right", "x_norm": 1.0, "y_norm": 1.0}, {"label": "bottom_left", "x_norm": 0.0, "y_norm": 1.0}]}];
const labels = ["top_left", "top_right", "bottom_right", "bottom_left"];
let clips = window.CALIBRATION_CLIPS || [];
let active = 0;
let pointsByClip = {};
const canvas = document.getElementById("fieldCanvas");
const ctx = canvas.getContext("2d");
const select = document.getElementById("clipSelect");
const pointList = document.getElementById("pointList");
const meta = document.getElementById("clipMeta");
const statusNode = document.getElementById("saveStatus");
const image = new Image();

function init() {
  clips.forEach((clip, index) => {
    const option = document.createElement("option");
    option.value = String(index);
    option.textContent = `${clip.clip_id} | frame ${clip.overlay_frame}`;
    select.appendChild(option);
    pointsByClip[clip.clip_id] = (clip.image_points || []).map((point) => ({...point}));
  });
  select.addEventListener("change", () => {
    active = Number(select.value);
    loadClip();
  });
  canvas.addEventListener("click", recordPoint);
  document.getElementById("resetBtn").addEventListener("click", resetPoints);
  document.getElementById("downloadBtn").addEventListener("click", downloadJson);
  document.getElementById("saveBtn").addEventListener("click", saveJson);
  loadClip();
}

function currentClip() {
  return clips[active];
}

function clipImageSource(clip) {
  if (window.location.protocol === "http:" || window.location.protocol === "https:") {
    return clip.overlay_server_path;
  }
  return clip.overlay_static_path;
}

function loadClip() {
  const clip = currentClip();
  meta.innerHTML = `Resolucion ${clip.width}x${clip.height}<br>Overlay: <a href="${clipImageSource(clip)}">${clip.overlay_frame}</a><br>Confianza seed: ${clip.confidence}`;
  image.onload = () => {
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;
    draw();
  };
  image.src = clipImageSource(clip);
  renderPoints();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(image, 0, 0);
  const points = pointsByClip[currentClip().clip_id] || [];
  ctx.lineWidth = 4;
  ctx.strokeStyle = "#f5c542";
  ctx.fillStyle = "#111111";
  if (points.length > 1) {
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    points.slice(1).forEach((point) => ctx.lineTo(point.x, point.y));
    if (points.length === 4) ctx.closePath();
    ctx.stroke();
  }
  points.forEach((point, index) => {
    ctx.beginPath();
    ctx.arc(point.x, point.y, 11, 0, Math.PI * 2);
    ctx.fillStyle = "#f5c542";
    ctx.fill();
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#111111";
    ctx.stroke();
    ctx.fillStyle = "#111111";
    ctx.font = "18px sans-serif";
    ctx.fillText(String(index + 1), point.x + 14, point.y - 14);
  });
}

function recordPoint(event) {
  const clip = currentClip();
  const rect = canvas.getBoundingClientRect();
  const x = (event.clientX - rect.left) * (canvas.width / rect.width);
  const y = (event.clientY - rect.top) * (canvas.height / rect.height);
  const points = pointsByClip[clip.clip_id] || [];
  const next = points.length >= 4 ? [] : points;
  next.push({label: labels[next.length], x: Math.round(x * 1000) / 1000, y: Math.round(y * 1000) / 1000});
  pointsByClip[clip.clip_id] = next;
  renderPoints();
  draw();
}

function resetPoints() {
  const clip = currentClip();
  pointsByClip[clip.clip_id] = (clip.image_points || []).map((point) => ({...point}));
  renderPoints();
  draw();
}

function renderPoints() {
  const points = pointsByClip[currentClip().clip_id] || [];
  pointList.innerHTML = "";
  labels.forEach((label, index) => {
    const point = points[index];
    const item = document.createElement("li");
    item.textContent = point ? `${label}: ${point.x}, ${point.y}` : `${label}: pendiente`;
    pointList.appendChild(item);
  });
}

function buildPayload() {
  const payload = {rule_version: "manual_field_calibration_v0.1", review_status: "human_saved", clips: {}};
  clips.forEach((clip) => {
    const points = (pointsByClip[clip.clip_id] || []).slice(0, 4);
    payload.clips[clip.clip_id] = {
      clip_id: clip.clip_id,
      calibration_id: `${clip.clip_id}_manual_four_corner_v0.1`,
      image_size: {width: clip.width, height: clip.height},
      image_points: points,
      field_points: clip.field_points,
      notes: "Saved from FutBotMX local manual calibration editor."
    };
  });
  return payload;
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(buildPayload(), null, 2) + "\n"], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "field_calibration.json";
  link.click();
  URL.revokeObjectURL(url);
}

async function saveJson() {
  if (!(window.location.protocol === "http:" || window.location.protocol === "https:")) {
    downloadJson();
    statusNode.textContent = "Archivo descargado; abre el editor con el servidor local para guardar directo.";
    return;
  }
  const response = await fetch("/save-calibration", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(buildPayload())
  });
  statusNode.textContent = response.ok ? "field_calibration.json guardado." : "No se pudo guardar.";
}

init();
</script>
</body>
</html>
