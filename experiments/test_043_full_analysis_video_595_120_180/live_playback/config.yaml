project:
  name: FutBotMX
paths:
  data_dir: data
  sample_dir: data/sample
  output_dir: outputs
  experiments_dir: experiments
video:
  input_path: data/sample/clip_01.mp4
  frame_stride: 1
  max_frames: 300
segmentation:
  provider: grounded_sam
  checkpoint_path_env: SAM3_CHECKPOINT_PATH
  owlv2_model_path: checkpoints/owlv2-base
  owlv2_confidence_threshold: 0.1
  sam3_confidence_threshold: 0.05
  classes:
  - green_soccer_field
  - small_robot
  - ball
  - yellow_goalpost
  confidence_threshold: 0.5
  goalpost:
    detection_method: owlv2_grounded_sam
    fallback: geometric_fallback
    note: "OWLv2 detects 'yellow goalpost' at conf\u22480.11; SAM3 box-prompt produces\
      \ pixel mask. Fallback to geometric_fallback if OWLv2 not available."
    fallback_params:
      goal_x_start_norm: 0.39
      goal_x_end_norm: 0.61
      goal_height_norm: 0.04
tracking:
  method: bytetrack
  max_lost_frames: 15
  min_track_length: 3
  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
events:
  rule_version: events_v0.2_real
  possession_distance_px: 190
  possession_min_frames: 8
  collision_distance_px: 35
  collision_min_frames: 4
  shot_min_ball_speed_px_per_sec: 350
level2_events:
  rule_version: level2_events_v0.1
  possession_distance_px: 190
  recovery_min_frames: 5
  interception_max_gap_frames: 12
  interception_min_speed_px_per_sec: 120
  highlight_min_speed_px_per_sec: 250
  zone_axis: y
level2_multiclip:
  tracker: bytetrack
  allow_simple_fallback: false
  clips:
  - clip_id: video_595
    role: candidate
    width: 1344
    height: 1792
    fps: 59.71505265331406
    detections: experiments/test_009_level1_solidity/deduplication/video_595_detections_cleaned.json
    notes: Candidato Nivel 2; debe reemplazarse por evidencia densa en cierre test_017.
  - clip_id: video_667
