  draw_events: true
  draw_possession_status: true
  export_screenshots: true
  export_video: false
  export_heatmap: true
  export_timeline: true
live_playback:
  rule_version: live_playback_app_v0.1
  mode: playback_precomputado
  clock_source: video_currentTime
  contract: live_playback_data_contract_v0.1
  config:
    clip_id: video_595
    video_path: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-595_singular_display.mov"
    fps: 59.71505265331406
    width: 1344
    height: 1792
    start_frame: 120
    end_frame: 180
    tracks_csv: experiments/test_043_full_analysis_video_595_120_180/level3_spatial/level3_tracks.csv
    events_json: experiments/test_043_full_analysis_video_595_120_180/level3_events/level3_events.json
    highlights_csv: experiments/test_043_full_analysis_video_595_120_180/level3_events/level3_highlights.csv
    output_dir: experiments/test_043_full_analysis_video_595_120_180/live_playback
    trail_length: 16
    inference_mode: precomputed
    sam3_stride: 8
    lightweight_stride: 2
    allow_gpu: false
    gpu_profile: cpu_safe
  inference:
    selected_mode: precomputed
    recommended_mode: precomputed
    available_modes:
    - precomputed
    - sam3_sampling
    - lightweight_detector
    modes:
    - mode_id: precomputed
      label: Precomputed SAM 3 detections
      status: recommended_for_demo
      recommended: true
      selected: true
      detection_source: experiments/test_043_full_analysis_video_595_120_180/level3_spatial/level3_tracks.csv
      fallback_mode: precomputed
      stride_frames: 1
      frame_resolution_policy: exact_or_nearest_available_frame
      reuse_policy: load_cached_tracks_by_frame
      interpolation_policy: disabled; use exact frame or previous/future nearest frame
      gpu_required: false
      hardware_profile: any_local_machine
      online_inference: false
      tracker_compatible: true
      expected_latency_ms: 0.65
      latency_budget_ms: 16.746196
      gpu_memory_metric: not_applicable
      quality_note: Usa artefactos SAM 3/Level 3 ya generados; recomendado para demo
        fluida.
      limitation: No mejora ni corrige detecciones durante playback; depende de la
        calidad offline.
    - mode_id: sam3_sampling
      label: SAM 3 sampling
      status: configured_gpu_required
      recommended: false
      selected: false
      detection_source: sam3_runtime_sampling_with_precomputed_fallback
      fallback_mode: precomputed
      stride_frames: 8
      frame_resolution_policy: sampled_frame_or_nearest_cached_frame
      reuse_policy: reuse_last_sampled_detection_until_next_sampling_frame
      interpolation_policy: reuse detections between sampled frames; interpolation
        remains disabled until validated
      gpu_required: true
      hardware_profile: msi_gpu_only
      online_inference: true
      tracker_compatible: true
      expected_latency_ms: 95.0
      latency_budget_ms: 16.746196
      gpu_memory_metric: unavailable_without_gpu_probe
      quality_note: Mantiene calidad SAM 3 en frames muestreados y conserva fallback
        precomputado.
      limitation: No debe ejecutarse cada frame; requiere laptop MSI con GPU y medicion
        real de VRAM.
    - mode_id: lightweight_detector
      label: Lightweight robot/ball detector
      status: experimental_stub
      recommended: false
      selected: false
      detection_source: lightweight_detector_stub_with_precomputed_fallback
      fallback_mode: precomputed
      stride_frames: 2
      frame_resolution_policy: fast_detector_frame_or_nearest_cached_frame
      reuse_policy: run lightweight detector on stride and reuse cached tracks for
        gaps
      interpolation_policy: reuse nearest detections; SAM 3 offline remains source
        of high-quality masks
      gpu_required: false
      hardware_profile: cpu_or_gpu
      online_inference: true
      tracker_compatible: true
      expected_latency_ms: 8.0
      latency_budget_ms: 16.746196
      gpu_memory_metric: optional
      quality_note: Prioriza fluidez y deteccion de robots/balon; calidad inferior
        a SAM 3 offline.
      limitation: No genera mascaras SAM 3 de alta calidad y puede degradar precision
        de eventos.
    selection_source: CLI override or live_playback.inference.mode; default is precomputed.
    sam3_boundary: SAM 3 online sampling is documented but guarded for MSI GPU usage;
      this desktop run keeps deterministic fallback.
    lightweight_detector_boundary: Detector ligero remains an experimental hook compatible
      with the incremental tracker.
    limitations:
    - No mejora ni corrige detecciones durante playback; depende de la calidad offline.
    - No debe ejecutarse cada frame; requiere laptop MSI con GPU y medicion real de
      VRAM.
    - No genera mascaras SAM 3 de alta calidad y puede degradar precision de eventos.
    selected_profile:
      mode_id: precomputed
      label: Precomputed SAM 3 detections
      status: recommended_for_demo
      recommended: true
      selected: true
      detection_source: experiments/test_043_full_analysis_video_595_120_180/level3_spatial/level3_tracks.csv
      fallback_mode: precomputed
      stride_frames: 1
      frame_resolution_policy: exact_or_nearest_available_frame
      reuse_policy: load_cached_tracks_by_frame
      interpolation_policy: disabled; use exact frame or previous/future nearest frame
      gpu_required: false
      hardware_profile: any_local_machine
      online_inference: false
      tracker_compatible: true
      expected_latency_ms: 0.65
      latency_budget_ms: 16.746196
      gpu_memory_metric: not_applicable
      quality_note: Usa artefactos SAM 3/Level 3 ya generados; recomendado para demo
        fluida.
      limitation: No mejora ni corrige detecciones durante playback; depende de la
        calidad offline.
