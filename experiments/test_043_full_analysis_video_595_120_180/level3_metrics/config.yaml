visualization:
  draw_masks: true
  draw_bboxes: true
  draw_ids: true
  draw_centroids: true
  draw_trails: true
  trail_length: 30
  draw_events: true
  draw_possession_status: true
  export_screenshots: true
  export_video: false
  export_heatmap: true
  export_timeline: true
level3_tactical_metrics:
  rule_version: level3_tactical_metrics_v0.1
  source_tracks: experiments/test_043_full_analysis_video_595_120_180/team_assignment/level3_tracks_with_teams.csv
  output_dir: experiments/test_043_full_analysis_video_595_120_180/level3_metrics
  grid:
    x: 24
    y: 16
    cells: 384
  thresholds:
    possession_distance_norm: 0.28
    pressure_distance_norm: 0.32
    robot_interaction_distance_norm: 0.22
    dispute_distance_norm: 0.32
    min_track_confidence: 0.5
  outputs:
  - level3_metrics.csv
  - level3_metrics.json
  - spatial_control.csv
  - voronoi_frames.csv
  - interaction_metrics.csv
  - interaction_edges.csv
  - interaction_graph.json
  - summary.md
