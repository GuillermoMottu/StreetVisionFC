  dense_min_frames: 61
  level3_status: gate_ready_not_started
  clips:
  - clip_id: video_595
    role: dense_candidate
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-595_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 615
    - 1344
    - 1792
    width: 1344
    height: 1792
    fps: 59.71505265331406
  - clip_id: video_667
    role: dense_candidate
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-667_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 620
    - 1360
    - 1808
    width: 1360
    height: 1808
    fps: 59.70695970695971
  - clip_id: video_480
    role: diagnostic
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-480_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 620
    - 1360
