  activity18_failure_modes_csv: experiments/test_036_activity18_clip_validation/failure_modes.csv
  activity19_summary_md: experiments/test_037_activity19_video_overlay/summary.md
  activity19_segments_csv: experiments/test_037_activity19_video_overlay/video_overlay_segments.csv
  activity19_contact_sheet_png: experiments/test_037_activity19_video_overlay/video_overlay_contact_sheet.png
  activity19_render_plan_md: experiments/test_037_activity19_video_overlay/render_overlay_clip_plan.md
  local_pdf_path: local_outputs/activity20/futbotmx_final_report.pdf
  outputs:
