project:
  name: FutBotMX
  level: 2
paths:
  data_dir: data
  sample_dir: data/sample
  output_dir: outputs
  experiments_dir: experiments
video:
  input_path: data/sample/clip_01.mp4
  frame_stride: 1
  max_frames: 300
segmentation:
  provider: sam3
  checkpoint_path_env: SAM3_CHECKPOINT_PATH
  classes:
  - green_soccer_field
  - small_robot
  - ball
  confidence_threshold: 0.5
tracking:
  method: bytetrack
  max_lost_frames: 15
  min_track_length: 3
  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
events:
  rule_version: events_v0.2_real
  possession_distance_px: 190
  possession_min_frames: 8
  collision_distance_px: 35
  collision_min_frames: 4
  shot_min_ball_speed_px_per_sec: 350
level2_events:
  rule_version: level2_events_v0.1
  possession_distance_px: 190
  recovery_min_frames: 5
  interception_max_gap_frames: 12
  interception_min_speed_px_per_sec: 120
  highlight_min_speed_px_per_sec: 250
  zone_axis: y
level2_multiclip:
  tracker: bytetrack
  allow_simple_fallback: false
  clips:
  - clip_id: video_595
    role: candidate
    width: 1344
    height: 1792
    fps: 59.71505265331406
    detections: experiments/test_009_level1_solidity/deduplication/video_595_detections_cleaned.json
    notes: Candidato Nivel 2; debe reemplazarse por evidencia densa en cierre test_017.
  - clip_id: video_667
    role: candidate
    width: 1360
    height: 1808
    fps: 59.70695970695971
    detections: experiments/test_009_level1_solidity/deduplication/video_667_detections_cleaned.json
    notes: Candidato Nivel 2; debe reemplazarse por evidencia densa en cierre test_017.
  - clip_id: video_836
    role: baseline
    width: 1360
    height: 1808
    fps: 59.707724425887264
    tracks: experiments/test_003_tracking/video_836_real_tracking_120_180/tracks_bytetrack.csv
    metrics: experiments/test_012_level2_metrics/video_836_real_metrics_120_180/level2_metrics.json
    events: experiments/test_013_level2_events/video_836_real_events_120_180/level2_events.json
    notes: Baseline Nivel 2 con tracks ByteTrack densos en frames 120-180.
  - clip_id: video_480
    role: diagnostic
    width: 1360
    height: 1808
    fps: 59.6995427824951
    detections: experiments/test_006_more_copafutmx_videos/video_480_short_window/detections_filtered_roi.json
    notes: Diagnostico formal de balon para cierre Nivel 2.
level2_closure:
  output_dir: experiments/test_017_level2_closure
  dense_min_frames: 61
  level3_status: gate_ready_not_started
  clips:
