visualization:
  draw_masks: true
  draw_bboxes: true
  draw_ids: true
  draw_centroids: true
  draw_trails: true
  trail_length: 30
  draw_events: true
  draw_possession_status: true
  export_screenshots: true
  export_video: false
  export_heatmap: true
  export_timeline: true
final_report:
  rule_version: activity20_final_report_v0.1
  output_dir: experiments/test_038_final_report
  project_name: FutBotMX
  report_title: Reporte Final FutBotMX
  project_readme_md: README.md
  dashboard_html: experiments/test_035_human_review/dashboard/dashboard.html
  reel_html: experiments/test_035_human_review/reel/reel_demo.html
  review_panel_html: experiments/test_035_human_review/human_review_panel.html
  final_demo_report_html: experiments/final_demo_report/FINAL_DEMO_REPORT.html
