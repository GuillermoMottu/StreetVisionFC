visualization:
  draw_masks: true
  draw_bboxes: true
  draw_ids: true
  draw_centroids: true
  draw_trails: true
  trail_length: 30
  draw_events: true
  draw_possession_status: true
  export_screenshots: true
  export_video: false
  export_heatmap: true
  export_timeline: true
level3_visualizations:
  rule_version: level3_visualizations_v0.1
  tracks_csv: experiments/test_026_level3_multiclip/video_595/spatial_model/level3_tracks.csv
  calibration_json: experiments/test_026_level3_multiclip/video_595/spatial_model/field_calibration.json
  spatial_control_csv: experiments/test_026_level3_multiclip/video_595/tactical_metrics/spatial_control.csv
  voronoi_frames_csv: experiments/test_026_level3_multiclip/video_595/tactical_metrics/voronoi_frames.csv
  interaction_graph_json: experiments/test_026_level3_multiclip/video_595/tactical_metrics/interaction_graph.json
  interaction_edges_csv: experiments/test_026_level3_multiclip/video_595/tactical_metrics/interaction_edges.csv
