project:
  name: FutBotMX
  level: 2
paths:
  data_dir: data
  sample_dir: data/sample
  output_dir: outputs
  experiments_dir: experiments
video:
  input_path: data/sample/clip_01.mp4
  frame_stride: 1
  max_frames: 300
segmentation:
  provider: sam3
  checkpoint_path_env: SAM3_CHECKPOINT_PATH
  classes:
  - green_soccer_field
  - small_robot
  - ball
  confidence_threshold: 0.5
tracking:
  method: bytetrack
  max_lost_frames: 15
  min_track_length: 3
  bytetrack:
    track_activation_threshold: 0.25
    lost_track_buffer: 30
    minimum_matching_threshold: 0.8
events:
  rule_version: events_v0.2_real
  possession_distance_px: 190
  possession_min_frames: 8
  collision_distance_px: 35
  collision_min_frames: 4
  shot_min_ball_speed_px_per_sec: 350
level2_events:
  rule_version: level2_events_v0.1
  possession_distance_px: 190
  recovery_min_frames: 5
  interception_max_gap_frames: 12
  interception_min_speed_px_per_sec: 120
  highlight_min_speed_px_per_sec: 250
  zone_axis: y
level2_multiclip:
  tracker: bytetrack
  allow_simple_fallback: false
  clips:
  - clip_id: video_595
    role: candidate
    width: 1344
    height: 1792
    fps: 59.71505265331406
    detections: experiments/test_009_level1_solidity/deduplication/video_595_detections_cleaned.json
    notes: Candidato Nivel 2; debe reemplazarse por evidencia densa en cierre test_017.
  - clip_id: video_667
    role: candidate
    width: 1360
    height: 1808
    fps: 59.70695970695971
    detections: experiments/test_009_level1_solidity/deduplication/video_667_detections_cleaned.json
    notes: Candidato Nivel 2; debe reemplazarse por evidencia densa en cierre test_017.
  - clip_id: video_836
    role: baseline
    width: 1360
    height: 1808
    fps: 59.707724425887264
    tracks: experiments/test_003_tracking/video_836_real_tracking_120_180/tracks_bytetrack.csv
    metrics: experiments/test_012_level2_metrics/video_836_real_metrics_120_180/level2_metrics.json
    events: experiments/test_013_level2_events/video_836_real_events_120_180/level2_events.json
    notes: Baseline Nivel 2 con tracks ByteTrack densos en frames 120-180.
  - clip_id: video_480
    role: diagnostic
    width: 1360
    height: 1808
    fps: 59.6995427824951
    detections: experiments/test_006_more_copafutmx_videos/video_480_short_window/detections_filtered_roi.json
    notes: Diagnostico formal de balon para cierre Nivel 2.
level2_closure:
  output_dir: experiments/test_017_level2_closure
  dense_min_frames: 61
  level3_status: gate_ready_not_started
  clips:
  - clip_id: video_595
    role: dense_candidate
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-595_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 615
    - 1344
    - 1792
    width: 1344
    height: 1792
    fps: 59.71505265331406
  - clip_id: video_667
    role: dense_candidate
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-667_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 620
    - 1360
    - 1808
    width: 1360
    height: 1808
    fps: 59.70695970695971
  - clip_id: video_480
    role: diagnostic
    video: "/home/guillermo/V\xEDdeos/CopaFutMX/17 Abril/video-480_singular_display.mov"
    start_frame: 120
    end_frame: 180
    stride: 1
    roi:
    - 0
    - 620
    - 1360
    - 1808
    width: 1360
    height: 1808
    fps: 59.6995427824951
visualization:
  draw_masks: true
  draw_bboxes: true
  draw_ids: true
  draw_centroids: true
  draw_trails: true
  trail_length: 30
  draw_events: true
  draw_possession_status: true
  export_screenshots: true
  export_video: false
  export_heatmap: true
  export_timeline: true
activity18_clip_validation:
  rule_version: activity18_clip_validation_v0.1
  output_dir: experiments/test_036_activity18_clip_validation
  clips:
  - clip_id: video_595
    role: principal_level3
    pipeline_scope: level3_reused
    camera_condition: vertical_estable
    light_condition: normal
    occlusion_condition: baja
    ball_visibility: alta
    robot_visibility: media
    field_visibility: alta
    selection_reason: Clip principal Nivel 3 con dashboard, visualizaciones y highlights
      ya versionados.
    level3_comparison_csv: experiments/test_026_level3_multiclip/level3_multiclip_comparison.csv
    level2_summary_md: experiments/test_017_level2_closure/video_595/summary.md
    diagnostic_summary_md: ''
    notes: ''
  - clip_id: video_667
    role: secundario_level3
    pipeline_scope: level3_reused
    camera_condition: vertical_con_mas_interacciones
    light_condition: normal
    occlusion_condition: media
    ball_visibility: alta
    robot_visibility: alta
    field_visibility: media
    selection_reason: Clip secundario Nivel 3 con mas robots/interacciones y homografia
      mas exigente.
    level3_comparison_csv: experiments/test_026_level3_multiclip/level3_multiclip_comparison.csv
    level2_summary_md: experiments/test_017_level2_closure/video_667/summary.md
    diagnostic_summary_md: ''
    notes: ''
  - clip_id: video_836
    role: baseline_level2
    pipeline_scope: level2_baseline
    camera_condition: vertical_baseline
    light_condition: normal
    occlusion_condition: media
    ball_visibility: media
    robot_visibility: alta
    field_visibility: alta
    selection_reason: Baseline historico Nivel 2 con tracks ByteTrack densos, util
      para comparar degradacion sin Level 3 completo.
    level3_comparison_csv: ''
    level2_summary_md: experiments/test_015_level2_multiclip/video_836/summary.md
    diagnostic_summary_md: ''
    notes: ''
  - clip_id: video_480
    role: diagnostico_fallo
    pipeline_scope: diagnostic_only
    camera_condition: vertical_diagnostico
    light_condition: normal
    occlusion_condition: alta
    ball_visibility: missing
    robot_visibility: alta
    field_visibility: media
    selection_reason: Caso diagnostico con robots/campo detectados pero sin balon
      en la muestra ligera.
    level3_comparison_csv: ''
    level2_summary_md: experiments/test_015_level2_multiclip/video_480/summary.md
    diagnostic_summary_md: experiments/test_017_level2_closure/video_480/diagnostic_summary.md
    notes: ''
  outputs:
  - clip_selection.csv
  - clip_validation_comparison.csv
  - failure_modes.csv
  - summary.md
  - video_480/clip_validation.csv
  - video_480/failure_modes.csv
  - video_480/summary.md
  - video_595/clip_validation.csv
  - video_595/failure_modes.csv
  - video_595/summary.md
  - video_667/clip_validation.csv
  - video_667/failure_modes.csv
  - video_667/summary.md
  - video_836/clip_validation.csv
  - video_836/failure_modes.csv
  - video_836/summary.md
